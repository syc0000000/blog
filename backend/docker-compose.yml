services:
  feedback-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedback-api
    restart: unless-stopped
    network_mode: host
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=blog_feedback
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
